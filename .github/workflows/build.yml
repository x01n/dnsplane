name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend into main/web
        working-directory: web
        run: |
          npm ci
          npm run build:ci

      - uses: actions/upload-artifact@v4
        with:
          name: embedded-web
          path: main/web
          retention-days: 14

  binaries:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: linux-amd64
          - goos: linux
            goarch: arm64
            artifact: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact: linux-armv7
          - goos: linux
            goarch: "386"
            artifact: linux-386
          - goos: darwin
            goarch: amd64
            artifact: darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: windows-amd64
          - goos: windows
            goarch: arm64
            artifact: windows-arm64
          - goos: freebsd
            goarch: amd64
            artifact: freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact: freebsd-arm64
          - goos: linux
            goarch: ppc64le
            artifact: linux-ppc64le
          - goos: linux
            goarch: riscv64
            artifact: linux-riscv64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: embedded-web
          path: main/web

      - uses: actions/setup-go@v5
        with:
          go-version-file: main/go.mod

      - name: Go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        shell: bash
        run: |
          set -euo pipefail
          cd main
          mkdir -p dist
          ext=""
          if [[ "$GOOS" == "windows" ]]; then ext=".exe"; fi
          name="dnsplane-${{ matrix.artifact }}"
          CGO_ENABLED=0 go build -buildvcs=false -trimpath -ldflags="-s -w" -o "dist/${name}${ext}" .

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: main/dist/*
          retention-days: 14

  release:
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: binary-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "IMAGE=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64,linux/arm/v7' }}
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
