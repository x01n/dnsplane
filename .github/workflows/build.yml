name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # Cache is unreliable across jobs for tag builds (restore misses matrix-saved keys).
  # Create the release once; each binaries matrix leg uploads its own asset (no artifact quota for many small files if under limits; avoids binary cache).
  release-init:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "$tag" --repo "${GITHUB_REPOSITORY}" --title "$tag" --generate-notes
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend into main/web
        working-directory: web
        run: |
          npm ci
          npm run build:ci

      # Use Actions cache instead of artifacts to avoid org artifact storage quota
      # (artifacts and cache bill separately; see run 24220646667 / upload-artifact failure).
      - uses: actions/cache/save@v4
        with:
          key: embedded-web-${{ github.sha }}
          path: main/web

  binaries:
    needs: [frontend, release-init]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: linux-amd64
          - goos: linux
            goarch: arm64
            artifact: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact: linux-armv7
          - goos: linux
            goarch: "386"
            artifact: linux-386
          - goos: darwin
            goarch: amd64
            artifact: darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: windows-amd64
          - goos: windows
            goarch: arm64
            artifact: windows-arm64
          - goos: freebsd
            goarch: amd64
            artifact: freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact: freebsd-arm64
          - goos: linux
            goarch: ppc64le
            artifact: linux-ppc64le
          - goos: linux
            goarch: riscv64
            artifact: linux-riscv64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache/restore@v4
        with:
          key: embedded-web-${{ github.sha }}
          path: main/web
          fail-on-cache-miss: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: main/go.mod

      - name: Go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        shell: bash
        run: |
          set -euo pipefail
          cd main
          mkdir -p dist
          ext=""
          if [[ "$GOOS" == "windows" ]]; then ext=".exe"; fi
          name="dnsplane-${{ matrix.artifact }}"
          CGO_ENABLED=0 go build -buildvcs=false -trimpath -ldflags="-s -w" -o "dist/${name}${ext}" .

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cd main/dist
          shopt -s nullglob
          files=( *)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No files in main/dist" >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --repo "${GITHUB_REPOSITORY}" --clobber

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "IMAGE=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64,linux/arm/v7' }}
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
